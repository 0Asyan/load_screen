<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading Screen</title>
    <style>
        body {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background: url('background/gm_construct.png') no-repeat center center fixed; 
            background-size: cover;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; font-family: sans-serif;
        }
        .container { text-align: center; }
        .logo { max-width: 156px; margin-bottom: 20px; }
        .title { font-size: 3rem; font-weight: bold; text-transform: uppercase; }

        #progress-container {
            position: absolute; 
            bottom: 70px; 
            left: 50px;
            right: 50px;
            height: 30px; 
            background: rgba(0, 0, 0, 0.5);
            border-radius: 0px;
            overflow: visible;
        }

        #baby {
            position: absolute;
            top: -50px;
            left: 0%;
            width: 60px;
            transition: left 0.1s linear;
            z-index: 10;
        }

        #progress-bar {
            width: 0%; height: 100%; background: white; transition: width 0.1s;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="images/logo.png" alt="Logo" class="logo">
        <div class="title">ORPHAN’S CITY</div>
    </div>

    <div id="progress-container">
        <img src="images/baby.png" id="baby" alt="baby">
        <div id="progress-bar"></div>
    </div>

    <script>
        var totalFiles = 0;
        var downloadedFiles = 0;

        function SetFilesTotal(total) {
            totalFiles = total;
        }

        function DownloadingFile(fileName) {
            downloadedFiles++;
            var percent = (downloadedFiles / totalFiles) * 100;
            document.getElementById('progress-bar').style.width = percent + "%";
            document.getElementById('baby').style.left = "calc(" + percent + "% - 20px)";
        }

        function GameDetails( servername, serverurl, mapname, maxplayers, steamid, gamemode, volume, language ) {
            var bgPath = "background/" + mapname + ".png";
            document.body.style.backgroundImage = "url('" + bgPath + "')";
        }
    </script>
</body>
</html>
