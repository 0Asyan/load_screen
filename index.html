<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading Screen</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background: #1e1e24 no-repeat center center fixed; 
            background-size: cover;
            transition: background-image 0.1s ease-in-out;
            overflow: hidden;
            font-family: sans-serif;
        }

        .loader-container {
            position: absolute;
            bottom: 100px;
            left: 5%;
            width: 90%;
            height: 60px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        #status-text {
            color: #ffffff;
            font-size: 18px;
            margin-bottom: 10px;
            text-shadow: 1px 1px 2px black;
        }

        .progress-track {
            position: relative;
            width: 100%;
            height: 20px;
            background: url('images/road.png') repeat-x center;
            background-size: 100% 100%;
            border-radius: 10px;
        }

        .progress-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0%;
            background: url('images/download.png') repeat-x center;
            background-size: 100% 100%;
            border-radius: 10px;
            transition: width 0.3s ease-out;
        }

        .baby-character {
            position: absolute;
            top: -45px;
            left: 0%;
            width: 60px;
            height: auto;
            transform: translateX(-50%);
            transition: left 0.3s ease-out;
        }
    </style>
</head>
<body>

    <div class="loader-container">
        <div id="status-text">Загрузка...</div>
        <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
            <img src="images/baby.png" alt="Baby" class="baby-character" id="baby">
        </div>
    </div>

    <script>
        let totalFiles = 0;
        let neededFiles = 0;

        window.GameDetails = function(servername, serverurl, mapname, maxplayers, steamid, gamemode, volume, language) {
            var bgPath = "background/" + mapname + ".png";
            document.body.style.backgroundImage = "url('" + bgPath + "')";
        };

        function updateProgress() {
            if (totalFiles <= 0) return;
            
            let downloaded = totalFiles - neededFiles;
            let percentage = (downloaded / totalFiles) * 100;
            
            percentage = Math.max(0, Math.min(100, percentage));

            document.getElementById('progressFill').style.width = percentage + '%';
            document.getElementById('baby').style.left = percentage + '%';
        }

        window.SetFilesTotal = function(total) {
            totalFiles = total;
            updateProgress();
        };

        window.SetFilesNeeded = function(needed) {
            neededFiles = needed;
            updateProgress();
        };

        window.SetStatusChanged = function(status) {
            document.getElementById('status-text').innerHTML = status;
        };

        window.DownloadingFile = function(fileName) {
            document.getElementById('status-text').innerHTML = "Скачивание: " + fileName;
        };
    </script>
</body>
</html>
