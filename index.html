<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Orphan`s City Life 2018</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; cursor: pointer; }
        
        .slide { position: absolute; width: 100%; height: 100%; opacity: 0; transition: opacity 1s ease; }
        .slide.active { opacity: 1; }

        .bg { position: absolute; width: 110%; height: 110%; top: -5%; left: -5%; background-size: cover; background-position: center; animation: zoom 10s linear infinite; z-index: 1;}
        
        .char { position: absolute; height: 110%; width: 50%; bottom: 0; background-size: contain; background-position: bottom center; background-repeat: no-repeat; z-index: 2;}
        
        .quote { position: absolute; width: 400px; font-size: 28px; font-weight: bold; text-shadow: 3px 3px 6px #000; padding: 20px; z-index: 3;}

        @keyframes zoom { from { transform: scale(1); } to { transform: scale(1.1); } }
        
        .move-right { animation: moveRight 20s linear; left: 10%; }
        @keyframes moveRight { from { left: 10%; } to { left: 30%; } }

        .move-left { animation: moveLeft 20s linear; right: 10%; }
        @keyframes moveLeft { from { right: 10%; } to { right: 30%; } }
        
        .move-zoom { animation: moveZoom 15s linear; left: 30%; transform-origin: bottom; }
        @keyframes moveZoom { from { transform: scale(0.8); } to { transform: scale(1); } }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="music/1.mp3" type="audio/mpeg">
        
    </audio>

    <div id="app"></div>

    <script>
        const slidesData = [
            { folder: 'ruslan', quote: 'Никогда не доверяй тому, у кого арбалет за спиной..', pos: 'move-right', quotePos: 'top: 15%; right: 10%;' },
            { folder: 'artem', quote: 'Город меняет всех, но не меня.', pos: 'move-zoom', quotePos: 'bottom: 20%; left: 5%;' },
            { folder: 'pidor', quote: 'Хомисайд это не про рдм... (Asyan)', pos: 'move-zoom', quotePos: 'bottom: 20%; left: 5%;' },
            { folder: 'hih', quote: 'На что я надеюсь в этом раунде..', pos: 'move-left', quotePos: 'top: 15%; right: 10%;' },
        ];
        // по умному
        let queue = [];
        const app = document.getElementById('app');
        const audio = document.getElementById('bgMusic');
        audio.volume = 0.3;

        document.body.addEventListener('click', () => {
            if (audio.paused) audio.play();
        }, { once: true });

        function getNextSlide() {
            if (queue.length === 0) {
                queue = [...slidesData]; 
                for (let i = queue.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [queue[i], queue[j]] = [queue[j], queue[i]];
                }
            }
            return queue.pop();
        }

        function showSlide() {
            const s = getNextSlide();
            const path = `lore/${s.folder}`;
            
            const newSlide = document.createElement('div');
            newSlide.className = 'slide';
            newSlide.innerHTML = `
                <div class="bg" style="background-image: url('${path}/bg.png')"></div>
                <div class="char ${s.pos}" style="background-image: url('${path}/char.png')"></div>
                <div class="quote" style="${s.quotePos}">${s.quote}</div>
            `;
            
            app.innerHTML = ''; 
            app.appendChild(newSlide);
            
            setTimeout(() => {
                newSlide.classList.add('active');
            }, 50); 
            
            setTimeout(() => {
                newSlide.classList.remove('active');
                
                setTimeout(() => {
                    showSlide();
                }, 1000);
            }, 9000);
        }

        showSlide();
    </script>
</body>
</html>
